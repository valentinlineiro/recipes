name: Add recipe from issue

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

jobs:
  add-recipe:
    if: contains(github.event.issue.labels.*.name, 'recipe')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Parse issue and add recipe
        env:
          ISSUE_BODY:   ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE:  ${{ github.event.issue.title }}
        run: |
          python3 scripts/parse_issue.py \
            --issue-body "$ISSUE_BODY" \
            --issue-number "$ISSUE_NUMBER"

      - name: Export JSON
        run: python3 scripts/export.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx ng build --base-href /recipes/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/recipes/browser
          branch: gh-pages
          clean: true

      - name: Commit updated database
        run: |
          git config user.name  "recipes-bot"
          git config user.email "recipes-bot@users.noreply.github.com"
          git add recipes.db
          git diff --staged --quiet || \
            git commit -m "data: add recipe from issue #${{ github.event.issue.number }}"
          git push

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Recipe added! It will be live at https://valentinlineiro.github.io/recipes/ in a few minutes.'
            })
            github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            })
